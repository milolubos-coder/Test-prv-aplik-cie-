<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <!-- Tento riadok zabezpečí, že sa aplikácia na iPhone zobrazí správne (nie zmenšene) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Prvá Aplikácia</title>
    <!-- Používame Tailwind CSS pre moderný vzhľad bez nutnosti písať samostatný CSS súbor -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animácia pre plynulé pridávanie úloh */
        .task-appear { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col items-center">

    <div class="w-full max-w-md p-6 mt-10">
        <!-- Hlavný panel aplikácie -->
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <header class="mb-8">
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Môj Zoznam</h1>
                <p id="dateDisplay" class="text-blue-600 font-semibold text-sm uppercase tracking-wider mt-1"></p>
            </header>

            <!-- Vstupné pole pre novú úlohu -->
            <div class="relative mb-8">
                <input type="text" id="taskInput" placeholder="Čo dnes urobíme?" 
                    class="w-full pl-5 pr-14 py-4 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all outline-none text-gray-800 placeholder-gray-400">
                <button onclick="addTask()" 
                    class="absolute right-2 top-2 bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all shadow-lg active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>

            <!-- Samotný zoznam úloh -->
            <ul id="taskList" class="space-y-3">
                <!-- Úlohy sa vygenerujú automaticky cez JavaScript -->
            </ul>

            <!-- Spodná časť s informáciami -->
            <div class="mt-8 pt-6 border-t border-gray-50 flex justify-between items-center text-xs text-gray-400 font-bold uppercase tracking-widest">
                <span id="stats">0 Úloh</span>
                <button onclick="clearCompleted()" class="hover:text-red-500 transition-colors">Vymazať hotové</button>
            </div>
        </div>
        
        <p class="text-center text-gray-300 text-xs mt-10">
            Dáta sa automaticky ukladajú vo vašom zariadení.
        </p>
    </div>

    <script>
        // Zobrazenie aktuálneho dátumu
        const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('sk-SK', dateOptions);

        // Načítanie úloh z pamäte (LocalStorage)
        let tasks = JSON.parse(localStorage.getItem('my_web_app_tasks')) || [
            { id: 1, text: "Vytvoriť repozitár na GitHub", completed: true },
            { id: 2, text: "Otvoriť web na iPhone", completed: false }
        ];

        function render() {
            const list = document.getElementById('taskList');
            const stats = document.getElementById('stats');
            list.innerHTML = '';
            
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-appear flex items-center justify-between p-4 rounded-2xl cursor-pointer transition-all ${task.completed ? 'bg-gray-50' : 'bg-white border border-gray-100 hover:border-blue-200 shadow-sm'}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-4 flex-1" onclick="toggleTask(${task.id})">
                        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${task.completed ? 'bg-green-500 border-green-500' : 'border-gray-200'}">
                            ${task.completed ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <span class="${task.completed ? 'line-through text-gray-400' : 'text-gray-700 font-semibold'}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-gray-300 hover:text-red-500 transition-colors p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                list.appendChild(li);
            });

            stats.innerText = `${tasks.length} Úloh celkom`;
            localStorage.setItem('my_web_app_tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text === '') return;

            tasks.push({ id: Date.now(), text: text, completed: false });
            input.value = '';
            render();
        }

        // Podpora pre klávesu Enter
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            render();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            render();
        }

        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            render();
        }

        // Prvé vykreslenie pri načítaní
        render();
    </script>
</body>
</html>
